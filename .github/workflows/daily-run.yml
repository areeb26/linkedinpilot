name: Daily LinkedIn Automation Run

on:
  schedule:
    - cron: '0 9 * * *' # Run daily at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium

      - name: Run Action Processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WORKSPACE_AES_SECRET: ${{ secrets.WORKSPACE_AES_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          # Run for a specific duration or until queue is empty
          # For a GH Action, we might want a script that processes once and exits
          python backend/main.py --timeout 3000 # Example: run for 50 mins
